name: Claude Assist

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  assist:
    # トリガー条件: @claude メンション（review/deepreview/frontreview は除外）
    if: |
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '@claude') &&
       !contains(github.event.comment.body, 'review') &&
       !contains(github.event.comment.body, 'deepreview') &&
       !contains(github.event.comment.body, 'frontreview')) ||
      (github.event_name == 'pull_request_review_comment' &&
       contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' &&
       github.event.action == 'assigned' &&
       contains(github.event.issue.body || '', 'claude')) ||
      (github.event_name == 'pull_request_review' &&
       contains(github.event.review.body || '', '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Assist
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: ${{ vars.CLAUDE_ACTION_MODEL_ASSIST || 'claude-sonnet-4-5-20250929' }}
          allowed_tools: |
            Edit
            Write
            Read
            Glob
            Grep
            WebFetch
            WebSearch
            Bash(cat:*)
            Bash(find:*)
            Bash(grep:*)
            Bash(head:*)
            Bash(ls:*)
            Bash(rg:*)
            Bash(tail:*)
            Bash(wc:*)
            Bash(git:*)
            Bash(gh:*)
            Bash(make:*)
            Bash(npm:*)
            Bash(go:*)
          timeout_minutes: 25
