# sqlc 設定。
#
# 集約別に sqlc を分割する方針（docs/plan/m2-implementation-bootstrap-plan.md §3）。
# 共通 schema（migrations/）を全 query セットで参照する。
#
# 現在のセット:
#   - PR3:  基盤確認用 (internal/database)
#   - PR7:  session 認可機構 (internal/auth/session)
#   - PR9a: Photobook 集約 (internal/photobook)
#   - PR18: Image 集約 (internal/image)
#   - PR20: Upload Verification (internal/uploadverification)

version: "2"
sql:
  # PR3: 基盤確認用（health のみ）。
  # schema は 00001 のみを指定し、他テーブル（sessions 等）の Model 型が混入しないようにする。
  - engine: "postgresql"
    schema:
      - "migrations/00001_create_health_check.sql"
    queries: "internal/database/queries"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/database/sqlcgen"
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
        emit_json_tags: false

  # PR7: Session 認可機構。schema は health + sessions の 2 本のみを指定。
  # PR9a で sessions に FK が追加されるが、本セットの query は photobooks を触らないため、
  # 00004 (FK 追加) は schema 解析対象には含めない（PR3 / PR7 同様、当該 set が触る
  # テーブルだけ schema に絞る方針）。
  - engine: "postgresql"
    schema:
      - "migrations/00001_create_health_check.sql"
      - "migrations/00002_create_sessions.sql"
    queries: "internal/auth/session/infrastructure/repository/rdb/queries"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/auth/session/infrastructure/repository/rdb/sqlcgen"
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
        emit_json_tags: false

  # PR9a: Photobook 集約。schema は health (前段で必要) + photobooks の 2 本に絞り、
  # sessions / FK は含めない（型混入を避ける、PR7 と同方針）。
  # PR19 で images / image_variants / photobook_pages / photobook_photos /
  # photobook_page_metas / cover_image_id FK を追加。
  - engine: "postgresql"
    schema:
      - "migrations/00001_create_health_check.sql"
      - "migrations/00003_create_photobooks.sql"
      - "migrations/00005_create_images.sql"
      - "migrations/00006_create_image_variants.sql"
      - "migrations/00007_create_photobook_pages.sql"
      - "migrations/00008_create_photobook_photos.sql"
      - "migrations/00009_create_photobook_page_metas.sql"
      - "migrations/00010_add_photobooks_cover_image_fk.sql"
    queries: "internal/photobook/infrastructure/repository/rdb/queries"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/photobook/infrastructure/repository/rdb/sqlcgen"
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
        emit_json_tags: false

  # PR18: Image 集約。schema は health + photobooks (FK 先) + images + image_variants の 4 本。
  # photobooks の query は本 set には含めない（型混入を避ける、PR9a と同方針）。
  - engine: "postgresql"
    schema:
      - "migrations/00001_create_health_check.sql"
      - "migrations/00003_create_photobooks.sql"
      - "migrations/00005_create_images.sql"
      - "migrations/00006_create_image_variants.sql"
    queries: "internal/image/infrastructure/repository/rdb/queries"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/image/infrastructure/repository/rdb/sqlcgen"
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
        emit_json_tags: false

  # PR20: Upload Verification Session。photobooks (FK 先) + upload_verification_sessions
  # の 3 本 schema。Photobook の query は本 set に含めない。
  - engine: "postgresql"
    schema:
      - "migrations/00001_create_health_check.sql"
      - "migrations/00003_create_photobooks.sql"
      - "migrations/00011_create_upload_verification_sessions.sql"
    queries: "internal/uploadverification/infrastructure/repository/rdb/queries"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/uploadverification/infrastructure/repository/rdb/sqlcgen"
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
        emit_json_tags: false

  # PR30: Outbox events。outbox_events 単独 schema。
  # 他 table への FK は持たない（aggregate_id は緩い参照）。
  - engine: "postgresql"
    schema:
      - "migrations/00001_create_health_check.sql"
      - "migrations/00012_create_outbox_events.sql"
    queries: "internal/outbox/infrastructure/repository/rdb/queries"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/outbox/infrastructure/repository/rdb/sqlcgen"
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
        emit_json_tags: false

  # PR33b: OGP 状態 (photobook_ogp_images)。photobooks(id) と images(id) を FK 参照。
  # 関連 schema を取り込み、photobook / image の query は本 set に含めない（型混入防止）。
  - engine: "postgresql"
    schema:
      - "migrations/00001_create_health_check.sql"
      - "migrations/00003_create_photobooks.sql"
      - "migrations/00005_create_images.sql"
      - "migrations/00006_create_image_variants.sql"
      - "migrations/00007_create_photobook_pages.sql"
      - "migrations/00008_create_photobook_photos.sql"
      - "migrations/00009_create_photobook_page_metas.sql"
      - "migrations/00010_add_photobooks_cover_image_fk.sql"
      - "migrations/00013_create_photobook_ogp_images.sql"
    queries: "internal/ogp/infrastructure/repository/rdb/queries"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/ogp/infrastructure/repository/rdb/sqlcgen"
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
        emit_json_tags: false

  # PR34b: Moderation Action 集約 (moderation_actions)。FK は持たず、
  # photobook_id / source_report_id は緩い参照（v4 設計書 §4）。
  # photobooks の query は本 set に含めない（型混入防止）。
  - engine: "postgresql"
    schema:
      - "migrations/00001_create_health_check.sql"
      - "migrations/00014_create_moderation_actions.sql"
    queries: "internal/moderation/infrastructure/repository/rdb/queries"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/moderation/infrastructure/repository/rdb/sqlcgen"
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
        emit_json_tags: false

  # PR35b: Report 集約 (reports)。FK は持たず、target_photobook_id /
  # resolved_by_moderation_action_id は緩い参照（v4 §3.6 P0-11）。
  # snapshot 3 カラム保持で Photobook purge 後も証跡を残す。
  - engine: "postgresql"
    schema:
      - "migrations/00001_create_health_check.sql"
      - "migrations/00016_create_reports.sql"
    queries: "internal/report/infrastructure/repository/rdb/queries"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/report/infrastructure/repository/rdb/sqlcgen"
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
        emit_json_tags: false

  # PR36: UsageLimit / RateLimit 集約 (usage_counters)。FK なし、scope_hash は
  # source_ip_hash の場合 REPORT_IP_HASH_SALT_V1 由来 hex（PR36 計画書 §6.4 / §7）。
  # INSERT ... ON CONFLICT DO UPDATE で race-free atomic increment。
  - engine: "postgresql"
    schema:
      - "migrations/00001_create_health_check.sql"
      - "migrations/00018_create_usage_counters.sql"
    queries: "internal/usagelimit/infrastructure/repository/rdb/queries"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/usagelimit/infrastructure/repository/rdb/sqlcgen"
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
        emit_json_tags: false
