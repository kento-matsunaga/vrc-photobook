# sqlc 設定。
#
# 集約別に sqlc を分割する方針（docs/plan/m2-implementation-bootstrap-plan.md §3）。
# 共通 schema（migrations/）を全 query セットで参照する。
#
# 現在のセット:
#   - PR3:  基盤確認用 (internal/database)
#   - PR7:  session 認可機構 (internal/auth/session)
#   - PR9a: Photobook 集約 (internal/photobook)
#   - PR18: Image 集約 (internal/image)

version: "2"
sql:
  # PR3: 基盤確認用（health のみ）。
  # schema は 00001 のみを指定し、他テーブル（sessions 等）の Model 型が混入しないようにする。
  - engine: "postgresql"
    schema:
      - "migrations/00001_create_health_check.sql"
    queries: "internal/database/queries"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/database/sqlcgen"
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
        emit_json_tags: false

  # PR7: Session 認可機構。schema は health + sessions の 2 本のみを指定。
  # PR9a で sessions に FK が追加されるが、本セットの query は photobooks を触らないため、
  # 00004 (FK 追加) は schema 解析対象には含めない（PR3 / PR7 同様、当該 set が触る
  # テーブルだけ schema に絞る方針）。
  - engine: "postgresql"
    schema:
      - "migrations/00001_create_health_check.sql"
      - "migrations/00002_create_sessions.sql"
    queries: "internal/auth/session/infrastructure/repository/rdb/queries"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/auth/session/infrastructure/repository/rdb/sqlcgen"
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
        emit_json_tags: false

  # PR9a: Photobook 集約。schema は health (前段で必要) + photobooks の 2 本に絞り、
  # sessions / FK は含めない（型混入を避ける、PR7 と同方針）。
  - engine: "postgresql"
    schema:
      - "migrations/00001_create_health_check.sql"
      - "migrations/00003_create_photobooks.sql"
    queries: "internal/photobook/infrastructure/repository/rdb/queries"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/photobook/infrastructure/repository/rdb/sqlcgen"
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
        emit_json_tags: false

  # PR18: Image 集約。schema は health + photobooks (FK 先) + images + image_variants の 4 本。
  # photobooks の query は本 set には含めない（型混入を避ける、PR9a と同方針）。
  - engine: "postgresql"
    schema:
      - "migrations/00001_create_health_check.sql"
      - "migrations/00003_create_photobooks.sql"
      - "migrations/00005_create_images.sql"
      - "migrations/00006_create_image_variants.sql"
    queries: "internal/image/infrastructure/repository/rdb/queries"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/image/infrastructure/repository/rdb/sqlcgen"
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
        emit_json_tags: false
